# Actualiza snapshots filtrados en public/snapshots/rutas/ (estado por tramos).
# Manual: Actions → "Route segments (RN / provincia)" → Run workflow.

name: Route segments (RN / provincia)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "17 10 * * *"
    - cron: "23 15 * * *"
    - cron: "41 21 * * *"
  workflow_dispatch:

jobs:
  route-segments:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Actualizar snapshots de rutas
        run: npx tsx scripts/update-route-segments.ts
        env:
          NODE_ENV: production
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}

      - name: Validar snapshot cristo-redentor
        run: |
          FILE="public/snapshots/rutas/cristo-redentor.json"
          if [ ! -f "$FILE" ]; then
            echo "❌ Missing: $FILE"
            exit 1
          fi
          node -e "const j=JSON.parse(require('fs').readFileSync('$FILE','utf8')); if(j.schemaVersion!==1||!j.segments?.length) process.exit(1); console.log('✅', j.profile, '→', j.segments.length, 'tramos |', j.summary.headline);" \
            || { echo "❌ JSON inválido: $FILE"; exit 1; }

      - name: Commit y push si hay cambios
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if ! git symbolic-ref -q HEAD >/dev/null; then
            git checkout -B "${BRANCH}"
          fi

          git add -A public/snapshots/rutas/

          if git diff --cached --quiet; then
            echo "✅ Sin cambios en snapshots de rutas — no se hace commit ni push."
            exit 0
          fi

          git commit --no-verify -m "chore: update route segment snapshots [skip ci]"
          git pull --rebase origin "${BRANCH}"
          git push origin "HEAD:${BRANCH}"
