# Actualiza snapshots en public/snapshots/ (pasos + datos ya incluidos en scrape).
# Manual: pestaña Actions → "Scrape pasos internacionales" → Run workflow.

name: Scrape pasos internacionales

on:
  schedule:
    # Tres corridas diarias (minuto/hora UTC). Sin :00 en las otras dos para reducir picos.
    # Argentina aprox. (UTC-3, sin DST): 07:30→04:30 | 15:23→12:23 | 21:41→18:41
    - cron: "30 7 * * *"
    - cron: "23 15 * * *"
    - cron: "41 21 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout (rama main)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Ejecutar scraper
        run: npx tsx scripts/scrape.ts
        env:
          NODE_ENV: production

      - name: Validar snapshots de pasos
        run: |
          echo "Validando snapshots..."
          for slug in cristo-redentor pehuenche agua-negra; do
            FILE="public/snapshots/$slug.json"
            if [ ! -f "$FILE" ]; then
              echo "❌ Missing: $FILE"
              exit 1
            fi
            node -e "const j=JSON.parse(require('fs').readFileSync('$FILE','utf8')); console.log('✅', '$slug', '→ rawStatus:', j.rawStatus, '| scrapedAt:', j.scrapedAt);" \
              || { echo "❌ JSON inválido: $FILE"; exit 1; }
          done

      - name: Commit y push si hay cambios
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/snapshots/
          if git diff --staged --quiet; then
            echo "Sin cambios en snapshots"
          else
            git commit -m "chore: update snapshots [skip ci]"
            git push origin main
          fi
