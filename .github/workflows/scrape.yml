name: Scrape pasos internacionales

on:
  schedule:
    - cron: "*/15 * * * *" # cada 15 minutos
  workflow_dispatch: # permite correrlo manualmente desde GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run scraper
        run: npx tsx scripts/scrape.ts
        env:
          NODE_ENV: production

      - name: Commit snapshots if changed
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/snapshots/
          if git diff --staged --quiet; then
            echo "No changes to snapshots, skipping commit"
          else
            git commit -m "chore: update snapshots [skip ci]"
            git push
          fi
