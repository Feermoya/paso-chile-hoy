# Actualiza snapshots en public/snapshots/ (pasos + datos ya incluidos en scrape).
# Manual: pestaña Actions → "Scrape pasos internacionales" → Run workflow.

name: Scrape pasos internacionales

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Tres corridas diarias (minuto/hora UTC). Sin :00 en las otras dos para reducir picos.
    # Argentina aprox. (UTC-3, sin DST): 07:30→04:30 | 15:23→12:23 | 21:41→18:41
    - cron: "30 7 * * *"
    - cron: "23 15 * * *"
    - cron: "41 21 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Ejecutar scraper
        run: npx tsx scripts/scrape.ts
        env:
          NODE_ENV: production

      - name: Validar snapshots de pasos
        run: |
          echo "Validando snapshots..."
          for slug in cristo-redentor pehuenche agua-negra; do
            FILE="public/snapshots/$slug.json"
            if [ ! -f "$FILE" ]; then
              echo "❌ Missing: $FILE"
              exit 1
            fi
            node -e "const j=JSON.parse(require('fs').readFileSync('$FILE','utf8')); console.log('✅', '$slug', '→ rawStatus:', j.rawStatus, '| scrapedAt:', j.scrapedAt);" \
              || { echo "❌ JSON inválido: $FILE"; exit 1; }
          done

      - name: Commit y push si hay cambios
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Asegurar que estamos en una rama (no detached HEAD)
          if ! git symbolic-ref -q HEAD >/dev/null; then
            git checkout -B "${BRANCH}"
          fi

          git add -A public/snapshots/

          if git diff --cached --quiet; then
            echo "✅ Sin cambios en snapshots — no se hace commit ni push."
            exit 0
          fi

          echo "Cambios detectados:"
          git status --short

          git commit --no-verify -m "chore: update snapshots [skip ci]"

          echo "Sincronizando con origin/${BRANCH}…"
          git pull --rebase origin "${BRANCH}"

          git push origin "HEAD:${BRANCH}"
          echo "✅ Push completado en ${BRANCH}."
