name: Scrape pasos internacionales

on:
  schedule:
    - cron: "*/15 * * * *" # cada 15 minutos
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run scraper
        run: npx tsx scripts/scrape.ts
        env:
          NODE_ENV: production

      - name: Validate snapshots
        run: |
          echo "Validando snapshots..."
          for slug in cristo-redentor pehuenche agua-negra; do
            FILE="public/snapshots/$slug.json"
            if [ ! -f "$FILE" ]; then
              echo "❌ Missing: $FILE"
              exit 1
            fi
            node -e "const j=JSON.parse(require('fs').readFileSync('$FILE','utf8')); console.log('✅', '$slug', '→ rawStatus:', j.rawStatus, '| scrapedAt:', j.scrapedAt);" \
              || { echo "❌ JSON inválido: $FILE"; exit 1; }
          done

      - name: Commit if changed
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/snapshots/
          if git diff --staged --quiet; then
            echo "Sin cambios en snapshots"
          else
            git commit -m "chore: update snapshots [skip ci]"
            git push origin main
          fi
